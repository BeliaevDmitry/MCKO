# ТОЛЬКО настройки базы данных
spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/school_analysis
    username: school_user
    password: school_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# Логирование
logging:
  level:
    org.springframework: WARN
    org.hibernate: WARN
    org.school.MckoReport: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"