spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/school_analysis
    username: school_user
    password: school_password
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false                      # ← ИЗМЕНИТЬ НА false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false                # ← ИЗМЕНИТЬ НА false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

# Логирование - УТОЧНИТЬ настройки
logging:
  level:
    # Hibernate SQL логи - ВЫКЛЮЧИТЬ
    org.hibernate.SQL: OFF               # ← ДОБАВИТЬ
    org.hibernate.type.descriptor.sql.BasicBinder: OFF  # ← ДОБАВИТЬ

    # Hibernate общие логи
    org.hibernate: WARN

    # Spring
    org.springframework: WARN
    org.springframework.transaction: WARN
    org.springframework.jdbc.core.JdbcTemplate: WARN

    # Ваше приложение
    org.school.MckoReport: WARN
    org.school.MckoReport.MckoCompleks: WARN
    org.school.MckoReport.MckoCompleks.service.ExcelExportService: WARN

    # База данных и пул соединений
    com.zaxxer.hikari: WARN
    org.postgresql: WARN

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"